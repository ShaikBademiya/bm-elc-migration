name: Deploy to Dev

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'amf/core/**'
      - 'artifacts/configs/**'
      - 'artifacts/jobs/**'
      - 'artifacts/dags/**'
      - 'artifacts/dbt/**'
      - 'databricks.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      python: ${{ steps.filter.outputs.python }}
      dags: ${{ steps.filter.outputs.dags }}
      dbt: ${{ steps.filter.outputs.dbt }}
      config: ${{ steps.filter.outputs.config }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'amf/core/**'
              - 'artifacts/configs/**'
              - 'artifacts/jobs/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'databricks.yml'

            dags:
              - 'artifacts/dags/**'

            dbt:
              - 'artifacts/dbt/**'

            config:
              - 'artifacts/configs/**'
              - 'artifacts/jobs/**'

  build-wheel:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Set package version
        run: |
            VERSION="0.0.${GITHUB_RUN_NUMBER}"

            echo "Package version: ${VERSION}"

            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml

            echo "Updated pyproject.toml:"
            grep '^version' pyproject.toml

      - name: Build wheel
        run: uv build --wheel

      # Optional: Inspect the generated wheel files for debugging purposes
      # - name: Inspect generated wheel
      #   run: |
      #       echo "Generated wheel files:"
      #       ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-wheel
          path: dist/*.whl

  deploy-artifact-registry-python:
    runs-on: ubuntu-latest
    needs: build-wheel
    if: needs.build-wheel.result == 'success'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-wheel
          path: dist

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install upload tools
        run: |
          python -m pip install --upgrade pip
          pip install twine keyring keyrings.google-artifactregistry-auth

      - name: Upload wheel to Artifact Registry
        env:
          TWINE_USERNAME: oauth2accesstoken
          REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
          PROJECT_ID: ${{ secrets.ARTIFACT_REGISTRY_PROJECT_ID }}
          REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_PYTHON_REPOSITORY }}
        run: |
          export TWINE_PASSWORD="$(gcloud auth print-access-token)"

          python -m twine upload --verbose \
            --repository-url "https://${REGION}-python.pkg.dev/${PROJECT_ID}/${REPOSITORY}/" \
            dist/*.whl

  deploy-artifact-registry-docker:
    runs-on: ubuntu-latest

    needs: build-wheel

    if: needs.build-wheel.result == 'success'

    steps:

      - uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-wheel
          path: dist

      - name: Verify wheel
        run: |
          echo "Wheel used for Docker image:"
          ls -lh dist/


      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2


      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker \
            ${{ secrets.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev


      - name: Build Docker image
        env:
          REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
          PROJECT_ID: ${{ secrets.ARTIFACT_REGISTRY_PROJECT_ID }}
          REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_DOCKER_REPOSITORY }}
          VERSION: ${{ needs.build-wheel.outputs.version }}

        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/amf:${VERSION}"

          echo "Building image:"
          echo "${IMAGE}"

          docker build \
            -t "${IMAGE}" \
            .

      - name: Push Docker image
        env:
          REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
          PROJECT_ID: ${{ secrets.ARTIFACT_REGISTRY_PROJECT_ID }}
          REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_DOCKER_REPOSITORY }}
          VERSION: ${{ needs.build-wheel.outputs.version }}

        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/amf:${VERSION}"

          echo "Pushing image:"
          echo "${IMAGE}"

          docker push "${IMAGE}"

  deploy-dags:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dags == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync DAGs to Composer
        run: |
          gsutil -m rsync -r -d \
            artifacts/dags/ \
            gs://${{ secrets.COMPOSER_BUCKET }}/dags/

  deploy-dbt:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dbt == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync dbt project
        run: |
          gsutil -m rsync -r -d \
            artifacts/dbt/ \
            gs://${{ secrets.COMPOSER_BUCKET }}/dbt/

  deploy-config:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.config == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync config files
        run: |
          gsutil -m rsync -r -d \
            artifacts/configs/ \
            gs://${{ secrets.COMPOSER_BUCKET }}/configs/
