name: Deploy to Dev

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'amf/core/**'
      - 'artifacts/configs/**'
      - 'artifacts/jobs/**'
      - 'artifacts/dags/**'
      - 'artifacts/dbt/**'
      - 'databricks.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      python: ${{ steps.filter.outputs.python }}
      composer: ${{ steps.filter.outputs.composer }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'amf/core/**'
              - 'artifacts/configs/**'
              - 'artifacts/jobs/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'databricks.yml'

            composer:
              - 'artifacts/dags/**'
              - 'artifacts/dbt/**'

  build-wheel:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Set package version
        run: |
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
            echo "Setting package version to ${VERSION}"

            python <<EOF
            from pathlib import Path
            import re

            pyproject = Path("pyproject.toml")
            text = pyproject.read_text()

            text = re.sub(
                r'^version = ".*"$',
                f'version = "{VERSION}"',
                text,
                flags=re.MULTILINE,
            )

            pyproject.write_text(text)
            print(pyproject.read_text())
            EOF

      - name: Build wheel
        run: uv build --wheel

      - name: Inspect generated wheel
        run: |
            echo "Generated wheel files:"
            ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-wheel
          path: dist/*.whl

  deploy-artifact-registry:
    runs-on: ubuntu-latest
    needs: build-wheel
    if: needs.build-wheel.result == 'success'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-wheel
          path: dist

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install upload tools
        run: |
          python -m pip install --upgrade pip
          pip install twine keyring keyrings.google-artifactregistry-auth

      - name: Upload wheel to Artifact Registry
        env:
          TWINE_USERNAME: oauth2accesstoken
          REGION: ${{ secrets.ARTIFACT_REGISTRY_REGION }}
          PROJECT_ID: ${{ secrets.ARTIFACT_REGISTRY_PROJECT_ID }}
          REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          export TWINE_PASSWORD="$(gcloud auth print-access-token)"

          python -m twine upload --verbose \
            --repository-url "https://${REGION}-python.pkg.dev/${PROJECT_ID}/${REPOSITORY}/" \
            dist/*.whl

  # deploy-databricks:
  #   runs-on: ubuntu-latest
  #   needs: build-wheel
  #   if: needs.build-wheel.result == 'success'

  #   env:
  #     DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  #     DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0

  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: pipeline-wheel
  #         path: dist

  #     - uses: databricks/setup-cli@main

  #     - name: Deploy bundle
  #       run: databricks bundle deploy -t dev

  deploy-composer:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.composer == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync DAGs to Composer
        run: |
          gsutil -m rsync -r -d \
            artifacts/dags/ \
            gs://${{ secrets.COMPOSER_BUCKET }}/dags/dsf/

      - name: Sync dbt project
        run: |
          gsutil -m rsync -r -d \
            artifacts/dbt/ \
            gs://${{ secrets.COMPOSER_BUCKET }}/data/dbt/
